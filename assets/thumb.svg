<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Karaoke Highway pedalboard thumbnail: pitch ribbon in miniature -->
  <rect width="256" height="256" rx="24" fill="#0b0b12"/>
  <!-- semitone lanes -->
  <g fill="#ffffff" opacity="0.05">
    <rect x="16" y="60" width="224" height="2"/>
    <rect x="16" y="92" width="224" height="2"/>
    <rect x="16" y="124" width="224" height="2"/>
    <rect x="16" y="156" width="224" height="2"/>
    <rect x="16" y="188" width="224" height="2"/>
  </g>
  <!-- sung bars (gold), active bar (bright), upcoming bars (purple) -->
  <rect x="18" y="178" width="46" height="20" rx="7" fill="#e8c040"/>
  <rect x="68" y="150" width="42" height="20" rx="7" fill="#ffe080"/>
  <rect x="118" y="122" width="44" height="20" rx="7" fill="#7850e6" opacity="0.85"/>
  <rect x="166" y="94" width="44" height="20" rx="7" fill="#7850e6" opacity="0.85"/>
  <rect x="214" y="66" width="26" height="20" rx="7" fill="#7850e6" opacity="0.85"/>
  <!-- playhead -->
  <rect x="88" y="24" width="3" height="196" fill="#ffffff" opacity="0.85"/>
  <!-- live pitch trace marker -->
  <rect x="64" y="143" width="40" height="6" rx="3" fill="#22d3ee"/>
  <!-- lyric text band hint -->
  <g fill="#c8cde1" opacity="0.75">
    <rect x="26" y="224" width="30" height="9" rx="4" fill="#e8c040"/>
    <rect x="64" y="224" width="24" height="9" rx="4" fill="#ffffff"/>
    <rect x="96" y="224" width="34" height="9" rx="4"/>
    <rect x="138" y="224" width="26" height="9" rx="4"/>
    <rect x="172" y="224" width="38" height="9" rx="4"/>
  </g>
</svg>
